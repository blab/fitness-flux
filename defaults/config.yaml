# Per-virus metadata provisioning (the provision_metadata rule): stream the
# Nextstrain metadata from S3, subset to these columns, and recompress to the
# data/{virus}_subset_metadata.tsv.zst that every dataset block's local_metadata
# points at. H3N2 is a private bucket (needs AWS credentials); SARS-CoV-2 is public.
provision:
  sarscov2:
    metadata_url: "s3://nextstrain-data/files/ncov/open/metadata.tsv.zst"
    decompress: "zstd -dc"
    columns: "strain,date,country,clade_nextstrain,Nextclade_pango,QC_overall_status"
    merge_clades:
      clade_nextstrain:
        WT: ["19A", "19B"]
  h3n2:
    metadata_url: "s3://nextstrain-data-private/files/workflows/seasonal-flu/h3n2/metadata.tsv.xz"
    decompress: "xz -dc"
    columns: "strain,date,country,subclade_nextclade_ha,qc.overallStatus_ha"

# Nextclade SARS-CoV-2 reference tree used to count per-Pango-lineage amino-acid
# mutations (the mutation_counts rules, feeding the lineage-deltas analysis).
# Re-fetch with `--forcerun fetch_nextclade_pango` to pick up newly defined lineages.
mutation_counts:
  nextclade_url: "https://nextstrain.org/nextclade/nextstrain/sars-cov-2/wuhan-hu-1/orfs"

# H3N2 uses a 2-year analysis window and slides 1-year forward, and a 2-week
# (14-day) empirical-frequency smoothing window (raw_freq_window) since it is
# sparser than SARS-CoV-2, which stays at the 1-week default.

h3n2_clades_2016-17:
  local_metadata: "data/h3n2_subset_metadata.tsv.zst"
  seq_count_options: >-
    --clade-column subclade_nextclade_ha
    --filter-columns country
    --filter-query "country == 'USA'"
    --location-column country
  min_date: "2016-01-01"
  max_date: "2017-12-31"
  clade_min_seq: 100
  pivot: "B.1"
  generation_time: 3.2
  raw_freq_window: 14

