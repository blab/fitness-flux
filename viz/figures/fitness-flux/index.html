<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fitness flux through time</title>
        <style>
            body {
                margin: 0;
                padding: 24px;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                color: #222;
            }
        </style>
    </head>
    <body>
        <div id="figure"></div>
        <script type="module">
            import { render } from "./fitness-flux.js";
            const slot = document.getElementById("figure");
            const data = await fetch("./data/sarscov2_clades.json").then((r) => r.json());
            const figure = render(slot, data, { mode: "slide" });
            let width = slot.clientWidth;
            new ResizeObserver(() => {
                if (slot.clientWidth && slot.clientWidth !== width) {
                    width = slot.clientWidth;
                    figure.resize();
                }
            }).observe(slot);
        </script>
    </body>
</html>
